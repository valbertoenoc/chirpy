basePath: /api
definitions:
  database.Chirp:
    properties:
      body:
        type: string
      created_at:
        type: string
      id:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  main.chirpResponse:
    properties:
      body:
        type: string
      created_at:
        type: string
      id:
        type: string
      token:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  main.createChirpParameters:
    properties:
      body:
        type: string
    type: object
  main.createUserParameters:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  main.createUserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      is_chirpy_red:
        type: boolean
      updated_at:
        type: string
    type: object
  main.errorResponse:
